                  <th style={{width:100,textAlign:"right"}}>Sold</th>
                  <th className="no-print" style={{width:35}}></th>
                </tr>
              </thead>
              <tbody>
                {registruCasa.rows.length===0&&<tr><td colSpan={9} style={{textAlign:"center",padding:30,color:"#999"}}>Nu sunt operatiuni cash luna aceasta.<br/>Adauga plati/incasari cu tip "Cash" sau operatiuni manuale.</td></tr>}
                {registruCasa.rows.map((r,i)=>{
                  if(r.type==="sold_init"){
                    return <tr key={`si-${i}`} className="rc-sold-row"><td style={{textAlign:"center"}}>{r.nr}</td><td></td><td></td><td></td><td>Sold initial {fmtDate(r.data)}</td><td></td><td></td><td style={{textAlign:"right",fontWeight:700}}>{fmt(r.sold)}<br/><span style={{fontSize:10,color:"#666"}}>RON</span></td><td className="no-print"></td></tr>;
                  }
                  if(r.type==="sold_final"){
                    return <tr key={`sf-${i}`} className="rc-sold-row"><td style={{textAlign:"center"}}>{r.nr}</td><td></td><td></td><td></td><td>Sold final {fmtDate(r.data)}</td><td></td><td></td><td style={{textAlign:"right",fontWeight:700}}>{fmt(r.sold)}<br/><span style={{fontSize:10,color:"#666"}}>RON</span></td><td className="no-print"></td></tr>;
                  }
                  const delOp=()=>{
                    if(!confirm("Esti sigur ca vrei sa stergi aceasta operatiune din registru?")) return;
                    if(r.src==="plati")removeItem("plati",r.id);
                    else if(r.src==="incasari")removeItem("incasari",r.id);
                    else if(r.src==="cheltuieli")removeItem("cheltuieliFaraTVA",r.id);
                    else if(r.src==="transfer"){const d={...data};d[year][month]={...d[year][month],operatiuniCasa:(d[year][month].operatiuniCasa||[]).filter(o=>o.id!==r.id)};updateData({...d});}
                  };
                  return <tr key={r.id||i}>
                    <td style={{textAlign:"center"}}>{r.nr}</td>
                    <td>{fmtDate(r.data)}</td>
                    <td style={{fontSize:11}}>{r.nrDoc||""}</td>
                    <td style={{fontSize:11}}>{r.tipDoc}</td>
                    <td>{r.explicatii}</td>
                    <td style={{textAlign:"right",color:r.incasare>0?"#059669":""}}>{r.incasare>0?<>{fmt(r.incasare)}<br/><span style={{fontSize:10,color:"#666"}}>RON</span></>:""}</td>
                    <td style={{textAlign:"right",color:r.plata>0?"#dc2626":""}}>{r.plata>0?<>-{fmt(r.plata)}<br/><span style={{fontSize:10,color:"#666"}}>RON</span></>:""}</td>
                    <td style={{textAlign:"right",fontWeight:600}}>{fmt(r.sold)}<br/><span style={{fontSize:10,color:"#666"}}>RON</span></td>
                    <td className="no-print"><button className="remove-btn" onClick={delOp} title="Sterge operatiunea">×</button></td>
                  </tr>;
                })}
              </tbody>
            </table>
            <div className="rc-oblio-footer">Intocmit de {firma.administrator}</div>
            <div className="rc-oblio-page">Pagina 1 din 1</div>
          </div>
        </div>}

        {/* GRAFICE */}
        {tab==="grafice"&&<div>
          <div className="card"><div className="card-header">📈 Evolutie Lunara — {year}</div><div className="card-body"><BarChart dataPoints={monthlyData} labels={["Incasari","Plati TVA","Ch. fara TVA"]} barColor1="var(--green)" barColor2="var(--red)" barColor3="var(--orange)"/></div></div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
            <div className="card"><div className="card-header">💰 Profit Lunar — {year}</div><div className="card-body"><svg viewBox="0 0 700 250" style={{width:"100%",maxWidth:700,height:"auto"}}>{(()=>{const profits=MONTHS.map(m=>{const md=data[year]?.[m]||{plati:[],incasari:[],cheltuieliFaraTVA:[]};const ch=md.cheltuieliFaraTVA||[];const inc=md.incasari.reduce((s,x)=>s+x.amount,0);const pl=md.plati.reduce((s,x)=>s+x.amount,0);const tCH=ch.reduce((s,x)=>s+x.amount,0);const tI=md.incasari.reduce((s,x)=>s+getTva(x.amount),0);const tP=md.plati.reduce((s,x)=>s+getTva(x.amount),0);return(inc-tI)-(pl-tP)-tCH;});const mx=Math.max(...profits.map(Math.abs),1);const cH=180,sX=60,stp=53,mY=20+cH/2;return <><line x1={sX} y1={mY} x2={680} y2={mY} stroke="var(--border)" strokeWidth="1"/><text x={sX-8} y={mY+4} textAnchor="end" fill="var(--text2)" fontSize="10">0</text>{profits.map((p,i)=>{const x=sX+i*stp+stp/2;const h=Math.abs(p)/mx*(cH/2);const y=p>=0?mY-h:mY;return <g key={i}><rect x={x-8} y={y} width={16} height={h} fill={p>=0?"var(--green)":"var(--red)"} rx="2"/><text x={x} y={240} textAnchor="middle" fill="var(--text2)" fontSize="9">{MONTHS[i].substring(0,3)}</text></g>;})}</>;})()}</svg></div></div>
            <div className="card"><div className="card-header">🧾 TVA Lunar — {year}</div><div className="card-body"><svg viewBox="0 0 700 250" style={{width:"100%",maxWidth:700,height:"auto"}}>{(()=>{const tvas=MONTHS.map(m=>{const md=data[year]?.[m]||{plati:[],incasari:[],cheltuieliFaraTVA:[]};return md.incasari.reduce((s,x)=>s+getTva(x.amount),0)-md.plati.reduce((s,x)=>s+getTva(x.amount),0);});const mx=Math.max(...tvas.map(Math.abs),1);const cH=180,sX=60,stp=53,mY=20+cH/2;return <><line x1={sX} y1={mY} x2={680} y2={mY} stroke="var(--border)" strokeWidth="1"/><text x={sX-8} y={mY+4} textAnchor="end" fill="var(--text2)" fontSize="10">0</text>{tvas.map((t,i)=>{const x=sX+i*stp+stp/2;const h=Math.abs(t)/mx*(cH/2);const y=t>=0?mY-h:mY;return <g key={i}><rect x={x-8} y={y} width={16} height={h} fill={t>=0?"var(--yellow)":"var(--green)"} rx="2"/><text x={x} y={240} textAnchor="middle" fill="var(--text2)" fontSize="9">{MONTHS[i].substring(0,3)}</text></g>;})}</>;})()}</svg></div></div>
          </div>
          {/* CASH FLOW FORECAST */}
          <div className="card" style={{marginTop:14,borderColor:"var(--blue)",borderWidth:2}}>
            <div className="card-header" style={{background:"var(--blue-bg)"}}>📈 Cash Flow Forecast — {year}</div>
            <div className="card-body">
              <div style={{fontSize:12,color:"var(--text2)",marginBottom:12}}>Previziune bazata pe media ultimelor {cashFlowForecast.window} luni cu date. Lunile viitoare sunt estimate.</div>
              <div style={{overflowX:"auto"}}><table><thead><tr><th>Luna</th><th style={{textAlign:"right"}}>Incasari</th><th style={{textAlign:"right"}}>Cheltuieli</th><th style={{textAlign:"right"}}>Net</th><th style={{textAlign:"right"}}>Sold cumulat</th><th>Tip</th></tr></thead><tbody>
                {(()=>{let sold=0;return cashFlowForecast.actual.map((a,i)=>{sold+=a.net;return <tr key={a.month}><td style={{fontWeight:600}}>{a.month}</td><td style={{textAlign:"right",color:"var(--green)"}}>{a.hasData?fmt(a.incasari):"—"}</td><td style={{textAlign:"right",color:"var(--red)"}}>{a.hasData?fmt(a.plati):"—"}</td><td style={{textAlign:"right",fontWeight:600,color:a.net>=0?"var(--green)":"var(--red)"}}>{a.hasData?fmt(a.net):"—"}</td><td style={{textAlign:"right",fontWeight:700,color:sold>=0?"var(--green)":"var(--red)"}}>{a.hasData?fmt(sold):"—"}</td><td><span className="badge" style={{background:"var(--green-bg)",color:"var(--green)"}}>Real</span></td></tr>;});})()}
                {cashFlowForecast.forecast.map(f=><tr key={f.month} style={{background:"var(--blue-bg)",opacity:0.85}}><td style={{fontWeight:600,fontStyle:"italic"}}>{f.month}</td><td style={{textAlign:"right",color:"var(--green)",fontStyle:"italic"}}>{fmt(f.incasari)}</td><td style={{textAlign:"right",color:"var(--red)",fontStyle:"italic"}}>{fmt(f.plati)}</td><td style={{textAlign:"right",fontWeight:600,color:f.net>=0?"var(--green)":"var(--red)",fontStyle:"italic"}}>{fmt(f.net)}</td><td style={{textAlign:"right",fontWeight:700,color:f.sold>=0?"var(--green)":"var(--red)"}}>{fmt(f.sold)}</td><td><span className="badge badge-neachitat">Forecast</span></td></tr>)}
              </tbody></table></div>
              {cashFlowForecast.forecast.length>0&&<div style={{marginTop:14,padding:12,borderRadius:8,background:cashFlowForecast.forecast[cashFlowForecast.forecast.length-1].sold>=0?"var(--green-bg)":"var(--red-bg)",fontSize:13}}>
                <strong>{cashFlowForecast.forecast[cashFlowForecast.forecast.length-1].sold>=0?"📈":"📉"} Prognoza la sfarsitul anului:</strong> Sold estimat <strong>{fmt(cashFlowForecast.forecast[cashFlowForecast.forecast.length-1].sold)} RON</strong>
                {cashFlowForecast.forecast[cashFlowForecast.forecast.length-1].sold<0&&<span style={{color:"var(--red)"}}> — Atentie, cash flow negativ!</span>}
              </div>}
            </div>
          </div>
        </div>}

        {/* TRIMESTRIAL */}
        {tab==="trimestrial"&&<div>
          <div style={{display:"flex",gap:12,flexWrap:"wrap",marginBottom:18}}>{quarterlyStats.map((q,i)=><div key={i} className="stat" style={{minWidth:220}}><div style={{fontSize:13,fontWeight:700,marginBottom:8,color:"var(--blue)"}}>{q.name}</div><div style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:3}}><span style={{color:"var(--text2)"}}>Incasari:</span><span style={{color:"var(--green)",fontWeight:600}}>{fmt(q.tI)}</span></div><div style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:3}}><span style={{color:"var(--text2)"}}>Plati:</span><span style={{color:"var(--red)",fontWeight:600}}>{fmt(q.tP)}</span></div><div style={{borderTop:"1px solid var(--border)",paddingTop:6,marginTop:6}}><div style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:3}}><span style={{color:"var(--text2)"}}>TVA:</span><span style={{fontWeight:700,color:q.tvaDePlata>0?"var(--red)":"var(--green)"}}>{fmt(q.tvaDePlata)}</span></div><div style={{display:"flex",justifyContent:"space-between",fontSize:12}}><span style={{color:"var(--text2)"}}>Impozit:</span><span style={{fontWeight:700,color:"var(--purple)"}}>{fmt(q.impozit)}</span></div></div></div>)}</div>
          <div className="card"><div className="card-header">📋 Sumar Trimestrial — {year}</div><div className="card-body" style={{overflowX:"auto"}}><table><thead><tr><th>Trimestru</th><th style={{textAlign:"right"}}>Venituri</th><th style={{textAlign:"right"}}>Cheltuieli</th><th style={{textAlign:"right"}}>Profit</th><th style={{textAlign:"right"}}>Impozit</th><th style={{textAlign:"right"}}>TVA</th></tr></thead><tbody>{quarterlyStats.map((q,i)=><tr key={i}><td style={{fontWeight:600}}>{q.name}</td><td style={{textAlign:"right",color:"var(--green)"}}>{fmt(q.bI)}</td><td style={{textAlign:"right",color:"var(--red)"}}>{fmt(q.bP+q.tCH)}</td><td style={{textAlign:"right",fontWeight:700,color:q.profit>=0?"var(--green)":"var(--red)"}}>{fmt(q.profit)}</td><td style={{textAlign:"right",color:"var(--purple)"}}>{fmt(q.impozit)}</td><td style={{textAlign:"right",color:q.tvaDePlata>0?"var(--red)":"var(--green)"}}>{fmt(q.tvaDePlata)}</td></tr>)}</tbody></table></div></div>
        </div>}

        {/* RAPOARTE */}
        {tab==="rapoarte"&&<div>
          <div className="no-print" style={{display:"flex",gap:10,marginBottom:18}}><button className="btn" onClick={printReport} style={{background:"var(--blue)"}}>🖨 Printeaza</button><button className="btn" onClick={exportCSV} style={{background:"var(--green)"}}>⬇ CSV</button><button className="btn" onClick={exportExcel} style={{background:"#1d6f42"}}>⬇ Excel</button></div>
          <div className="card"><div className="card-header">🖨 Raport — {month} {year}</div><div className="card-body">
            <h3 style={{fontSize:16,fontWeight:700,marginBottom:16,textAlign:"center"}}>{firma.nume} — Raport Financiar {month} {year}</h3>
            <table style={{fontSize:14}}><tbody>
              <tr><td style={{fontWeight:600,padding:"12px"}}>Incasari (cu TVA)</td><td style={{textAlign:"right",fontWeight:700,color:"var(--green)",padding:"12px"}}>{fmt(stats.tI)} RON</td></tr>
              <tr style={{background:"var(--bg3)"}}><td style={{fontWeight:600,padding:"12px"}}>Plati facturi (cu TVA)</td><td style={{textAlign:"right",fontWeight:700,color:"var(--red)",padding:"12px"}}>{fmt(stats.tP)} RON</td></tr>
              <tr><td style={{fontWeight:600,padding:"12px"}}>Cheltuieli fara TVA</td><td style={{textAlign:"right",fontWeight:700,color:"var(--orange)",padding:"12px"}}>{fmt(stats.tCH)} RON</td></tr>
              <tr style={{background:"var(--bg3)"}}><td style={{fontWeight:600,padding:"12px"}}>TVA Incasat</td><td style={{textAlign:"right",fontWeight:700,padding:"12px"}}>{fmt(stats.tvaI)} RON</td></tr>
              <tr><td style={{fontWeight:600,padding:"12px"}}>TVA Platit</td><td style={{textAlign:"right",fontWeight:700,padding:"12px"}}>{fmt(stats.tvaP)} RON</td></tr>
              <tr style={{borderTop:"2px solid var(--border)",background:"var(--yellow-bg)"}}><td style={{fontWeight:700,padding:"14px",fontSize:15}}>TVA de plata</td><td style={{textAlign:"right",fontWeight:700,color:stats.tvaDePlata>0?"var(--red)":"var(--green)",padding:"14px",fontSize:15}}>{fmt(stats.tvaDePlata)} RON</td></tr>
              <tr><td style={{fontWeight:600,padding:"12px"}}>Profit brut</td><td style={{textAlign:"right",fontWeight:700,color:stats.profit>=0?"var(--green)":"var(--red)",padding:"12px"}}>{fmt(stats.profit)} RON</td></tr>
              <tr style={{background:"var(--bg3)"}}><td style={{fontWeight:600,padding:"12px"}}>Impozit pe profit (16%)</td><td style={{textAlign:"right",fontWeight:700,color:"var(--purple)",padding:"12px"}}>{fmt(stats.impozit)} RON</td></tr>
              <tr style={{borderTop:"3px solid var(--purple)",background:"var(--blue-bg)"}}><td style={{fontWeight:800,fontSize:16,padding:"16px"}}>Profit net</td><td style={{textAlign:"right",fontWeight:800,fontSize:20,color:stats.profitNet>=0?"var(--green)":"var(--red)",padding:"16px"}}>{fmt(stats.profitNet)} RON</td></tr>
            </tbody></table>

            {/* Detalii plati */}
            {cur.plati.length>0&&<div style={{marginTop:24}}>
              <h4 style={{fontSize:14,fontWeight:700,marginBottom:10}}>📤 Plati furnizori ({cur.plati.length})</h4>
              <table><thead><tr><th>#</th><th>Furnizor</th><th style={{textAlign:"right"}}>Cu TVA</th><th style={{textAlign:"right"}}>Baza</th><th style={{textAlign:"right"}}>TVA</th><th>Categorie</th></tr></thead>
              <tbody>{cur.plati.map((p,i)=><tr key={p.id}><td>{i+1}</td><td>{p.name}</td><td style={{textAlign:"right",fontWeight:600}}>{fmt(p.amount)}</td><td style={{textAlign:"right"}}>{fmt(getBase(p.amount))}</td><td style={{textAlign:"right"}}>{fmt(getTva(p.amount))}</td><td>{p.category}</td></tr>)}</tbody>
              <tfoot><tr style={{fontWeight:700,borderTop:"2px solid var(--border)"}}><td colSpan={2}>TOTAL</td><td style={{textAlign:"right"}}>{fmt(stats.tP)}</td><td style={{textAlign:"right"}}>{fmt(stats.bP)}</td><td style={{textAlign:"right"}}>{fmt(stats.tvaP)}</td><td></td></tr></tfoot></table>
            </div>}

            {/* Detalii incasari */}
            {cur.incasari.length>0&&<div style={{marginTop:24}}>
              <h4 style={{fontSize:14,fontWeight:700,marginBottom:10}}>📥 Incasari clienti ({cur.incasari.length})</h4>
              <table><thead><tr><th>#</th><th>Client</th><th style={{textAlign:"right"}}>Cu TVA</th><th style={{textAlign:"right"}}>Baza</th><th style={{textAlign:"right"}}>TVA</th></tr></thead>
              <tbody>{cur.incasari.map((inc,i)=><tr key={inc.id}><td>{i+1}</td><td>{inc.name}</td><td style={{textAlign:"right",fontWeight:600}}>{fmt(inc.amount)}</td><td style={{textAlign:"right"}}>{fmt(getBase(inc.amount))}</td><td style={{textAlign:"right"}}>{fmt(getTva(inc.amount))}</td></tr>)}</tbody>
              <tfoot><tr style={{fontWeight:700,borderTop:"2px solid var(--border)"}}><td colSpan={2}>TOTAL</td><td style={{textAlign:"right"}}>{fmt(stats.tI)}</td><td style={{textAlign:"right"}}>{fmt(stats.bI)}</td><td style={{textAlign:"right"}}>{fmt(stats.tvaI)}</td></tr></tfoot></table>
            </div>}

            {/* Detalii cheltuieli fara TVA */}
            {chFTVA.length>0&&<div style={{marginTop:24}}>
              <h4 style={{fontSize:14,fontWeight:700,marginBottom:10}}>💼 Cheltuieli fara TVA ({chFTVA.length})</h4>
              <table><thead><tr><th>#</th><th>Descriere</th><th style={{textAlign:"right"}}>Suma</th><th>Categorie</th></tr></thead>
              <tbody>{chFTVA.map((c,i)=><tr key={c.id}><td>{i+1}</td><td>{c.name}</td><td style={{textAlign:"right",fontWeight:600}}>{fmt(c.amount)}</td><td>{c.category}</td></tr>)}</tbody>
              <tfoot><tr style={{fontWeight:700,borderTop:"2px solid var(--border)"}}><td colSpan={2}>TOTAL</td><td style={{textAlign:"right"}}>{fmt(stats.tCH)}</td><td></td></tr></tfoot></table>
            </div>}

            <div style={{marginTop:24,paddingTop:16,borderTop:"2px solid var(--border)",display:"flex",justifyContent:"space-between",fontSize:12,color:"var(--text2)"}}>
              <span>Generat: {new Date().toLocaleDateString("ro-RO")} · {firma.nume}</span>
              <span>Administrator: {firma.administrator}</span>
            </div>
          </div></div>

          {/* RAPORT P&L CLASIC */}
          <div className="card" style={{marginTop:16,borderColor:"var(--purple)",borderWidth:2}}>
            <div className="card-header" style={{background:"linear-gradient(135deg,#7c3aed11,#7c3aed22)"}}>📋 Profit & Loss (P&L) — {month} {year}</div>
            <div className="card-body">
              <h3 style={{fontSize:16,fontWeight:700,marginBottom:4,textAlign:"center"}}>{firma.nume}</h3>
              <p style={{textAlign:"center",fontSize:12,color:"var(--text2)",marginBottom:16}}>Raport Profit si Pierdere — {month} {year}</p>
              <table style={{fontSize:14}}>
                <thead><tr><th style={{textAlign:"left",padding:"10px 12px",fontSize:13}}>Indicator</th><th style={{textAlign:"right",padding:"10px 12px",fontSize:13}}>Suma (RON)</th></tr></thead>
                <tbody>
                  <tr style={{background:"var(--green-bg)"}}><td style={{fontWeight:800,padding:"12px",fontSize:15,borderBottom:"2px solid var(--green)"}}>I. VENITURI</td><td style={{textAlign:"right",fontWeight:800,color:"var(--green)",padding:"12px",fontSize:15,borderBottom:"2px solid var(--green)"}}>{fmt(stats.bI)}</td></tr>
                  <tr><td style={{padding:"8px 12px 8px 28px",color:"var(--text2)"}}>Venituri din vanzari (fara TVA)</td><td style={{textAlign:"right",padding:"8px 12px",color:"var(--green)"}}>{fmt(stats.bI)}</td></tr>

                  <tr style={{background:"var(--red-bg)"}}><td style={{fontWeight:800,padding:"12px",fontSize:15,borderBottom:"2px solid var(--red)"}}>II. CHELTUIELI</td><td style={{textAlign:"right",fontWeight:800,color:"var(--red)",padding:"12px",fontSize:15,borderBottom:"2px solid var(--red)"}}>{fmt(stats.bP + stats.tCH)}</td></tr>
                  <tr><td style={{padding:"8px 12px 8px 28px",color:"var(--text2)"}}>Cheltuieli cu marfuri/servicii (fara TVA)</td><td style={{textAlign:"right",padding:"8px 12px",color:"var(--red)"}}>{fmt(stats.bP)}</td></tr>
                  {Object.entries(stats.catMap).sort((a,b)=>b[1]-a[1]).map(([cat,val])=>
                    <tr key={cat}><td style={{padding:"6px 12px 6px 48px",fontSize:12,color:"var(--text3)"}}>• {cat}</td><td style={{textAlign:"right",padding:"6px 12px",fontSize:12,color:"var(--text3)"}}>{fmt(getBase(val))}</td></tr>
                  )}
                  <tr><td style={{padding:"8px 12px 8px 28px",color:"var(--text2)"}}>Cheltuieli operationale (fara TVA)</td><td style={{textAlign:"right",padding:"8px 12px",color:"var(--orange)"}}>{fmt(stats.tCH)}</td></tr>
                  {Object.entries(stats.catMapNoTVA).sort((a,b)=>b[1]-a[1]).map(([cat,val])=>
                    <tr key={cat}><td style={{padding:"6px 12px 6px 48px",fontSize:12,color:"var(--text3)"}}>• {cat}</td><td style={{textAlign:"right",padding:"6px 12px",fontSize:12,color:"var(--text3)"}}>{fmt(val)}</td></tr>
                  )}

                  <tr style={{borderTop:"3px solid var(--border)",background:"var(--yellow-bg)"}}><td style={{fontWeight:800,padding:"14px 12px",fontSize:15}}>III. PROFIT BRUT</td><td style={{textAlign:"right",fontWeight:800,color:stats.profit>=0?"var(--green)":"var(--red)",padding:"14px 12px",fontSize:18}}>{fmt(stats.profit)}</td></tr>

                  <tr><td style={{padding:"10px 12px 10px 28px",fontWeight:600}}>Impozit pe profit (16%)</td><td style={{textAlign:"right",padding:"10px 12px",fontWeight:600,color:"var(--purple)"}}>{fmt(stats.impozit)}</td></tr>

                  <tr style={{borderTop:"3px solid var(--purple)",background:"var(--blue-bg)"}}><td style={{fontWeight:800,padding:"16px 12px",fontSize:16}}>IV. PROFIT NET</td><td style={{textAlign:"right",fontWeight:800,color:stats.profitNet>=0?"var(--green)":"var(--red)",padding:"16px 12px",fontSize:20}}>{fmt(stats.profitNet)}</td></tr>

                  <tr style={{borderTop:"2px solid var(--border)"}}><td style={{padding:"10px 12px",fontWeight:600,color:"var(--text2)"}}>Marja profit net</td><td style={{textAlign:"right",padding:"10px 12px",fontWeight:700,color:"var(--blue)"}}>{stats.bI>0?(stats.profitNet/stats.bI*100).toFixed(1):"0.0"}%</td></tr>
                </tbody>
              </table>
            </div>
          </div>

          {/* P&L ANUAL */}
          <div className="card" style={{marginTop:16,borderColor:"var(--blue)",borderWidth:2}}>
            <div className="card-header" style={{background:"var(--blue-bg)"}}>📋 Profit & Loss Anual — {year}</div>
            <div className="card-body">
              <table style={{fontSize:14}}>
                <thead><tr><th style={{textAlign:"left",padding:"10px 12px"}}>Indicator</th><th style={{textAlign:"right",padding:"10px 12px"}}>Suma (RON)</th></tr></thead>
                <tbody>
                  <tr style={{background:"var(--green-bg)"}}><td style={{fontWeight:800,padding:"12px"}}>I. VENITURI</td><td style={{textAlign:"right",fontWeight:800,color:"var(--green)",padding:"12px"}}>{fmt(yearStats.bI)}</td></tr>
                  <tr style={{background:"var(--red-bg)"}}><td style={{fontWeight:800,padding:"12px"}}>II. CHELTUIELI TOTALE</td><td style={{textAlign:"right",fontWeight:800,color:"var(--red)",padding:"12px"}}>{fmt(yearStats.bP + yearStats.tCH)}</td></tr>
                  <tr><td style={{padding:"8px 12px 8px 28px",color:"var(--text2)"}}>Cheltuieli cu marfuri/servicii</td><td style={{textAlign:"right",padding:"8px 12px"}}>{fmt(yearStats.bP)}</td></tr>
                  <tr><td style={{padding:"8px 12px 8px 28px",color:"var(--text2)"}}>Cheltuieli operationale</td><td style={{textAlign:"right",padding:"8px 12px"}}>{fmt(yearStats.tCH)}</td></tr>
                  <tr style={{borderTop:"3px solid var(--border)",background:"var(--yellow-bg)"}}><td style={{fontWeight:800,padding:"14px 12px",fontSize:15}}>III. PROFIT BRUT</td><td style={{textAlign:"right",fontWeight:800,color:yearStats.profit>=0?"var(--green)":"var(--red)",padding:"14px 12px",fontSize:18}}>{fmt(yearStats.profit)}</td></tr>
                  <tr><td style={{padding:"10px 12px 10px 28px",fontWeight:600}}>Impozit pe profit (16%)</td><td style={{textAlign:"right",padding:"10px 12px",fontWeight:600,color:"var(--purple)"}}>{fmt(yearStats.impozit)}</td></tr>
                  <tr style={{borderTop:"3px solid var(--purple)",background:"var(--blue-bg)"}}><td style={{fontWeight:800,padding:"16px 12px",fontSize:16}}>IV. PROFIT NET</td><td style={{textAlign:"right",fontWeight:800,color:(yearStats.profit-yearStats.impozit)>=0?"var(--green)":"var(--red)",padding:"16px 12px",fontSize:20}}>{fmt(yearStats.profit-yearStats.impozit)}</td></tr>
                  <tr style={{borderTop:"2px solid var(--border)"}}><td style={{padding:"10px 12px",fontWeight:600,color:"var(--text2)"}}>Marja profit net</td><td style={{textAlign:"right",padding:"10px 12px",fontWeight:700,color:"var(--blue)"}}>{yearStats.bI>0?((yearStats.profit-yearStats.impozit)/yearStats.bI*100).toFixed(1):"0.0"}%</td></tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>}

        {/* CONTACTE */}
        {tab==="contacte"&&<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
          <div className="card" style={{borderColor:"var(--blue)",borderWidth:2}}><div className="card-header">🏭 Furnizori ({furnizori.length})</div><div className="card-body">
            <div style={{display:"flex",gap:8,marginBottom:14}}><input className="input" value={newFurn} onChange={e=>setNewFurn(e.target.value)} placeholder="Furnizor nou" onKeyDown={e=>e.key==="Enter"&&addFurnizor()}/><button className="btn" onClick={addFurnizor} style={{background:"var(--blue)"}}>+</button></div>
            <div style={{display:"flex",flexDirection:"column",gap:6}}>
              {furnizori.length===0&&<div style={{color:"var(--text3)",fontSize:13,textAlign:"center",padding:16}}>Furnizorii se adauga automat.</div>}
              {[...furnizori].sort().map(f=><div key={f} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 12px",background:"var(--bg3)",borderRadius:8}}>
                {editingContact&&editingContact.type==="furnizor"&&editingContact.name===f?<div style={{display:"flex",gap:6,flex:1}}><input className="input" value={editContactVal} onChange={e=>setEditContactVal(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")saveEditContact();if(e.key==="Escape")setEditingContact(null);}} autoFocus style={{padding:"6px 10px",fontSize:13}}/><button className="btn" onClick={saveEditContact} style={{background:"var(--green)",padding:"6px 12px",fontSize:12}}>✓</button><button className="btn" onClick={()=>setEditingContact(null)} style={{background:"var(--text3)",padding:"6px 12px",fontSize:12}}>✕</button></div>:<><span style={{fontSize:14,fontWeight:500}}>{f}</span><div><button className="edit-btn" onClick={()=>startEditContact("furnizor",f)}>✏️</button><button className="remove-btn" onClick={()=>removeFurnizor(f)}>×</button></div></>}
              </div>)}
            </div>
          </div></div>
          <div className="card" style={{borderColor:"var(--green)",borderWidth:2}}><div className="card-header">👤 Clienti ({clienti.length})</div><div className="card-body">
            <div style={{display:"flex",gap:8,marginBottom:14}}><input className="input" value={newCli} onChange={e=>setNewCli(e.target.value)} placeholder="Client nou" onKeyDown={e=>e.key==="Enter"&&addClient()}/><button className="btn" onClick={addClient} style={{background:"var(--green)"}}>+</button></div>
            <div style={{display:"flex",flexDirection:"column",gap:6}}>
              {clienti.length===0&&<div style={{color:"var(--text3)",fontSize:13,textAlign:"center",padding:16}}>Clientii se adauga automat.</div>}
              {[...clienti].sort().map(c=><div key={c} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 12px",background:"var(--bg3)",borderRadius:8}}>
                {editingContact&&editingContact.type==="client"&&editingContact.name===c?<div style={{display:"flex",gap:6,flex:1}}><input className="input" value={editContactVal} onChange={e=>setEditContactVal(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")saveEditContact();if(e.key==="Escape")setEditingContact(null);}} autoFocus style={{padding:"6px 10px",fontSize:13}}/><button className="btn" onClick={saveEditContact} style={{background:"var(--green)",padding:"6px 12px",fontSize:12}}>✓</button><button className="btn" onClick={()=>setEditingContact(null)} style={{background:"var(--text3)",padding:"6px 12px",fontSize:12}}>✕</button></div>:<><span style={{fontSize:14,fontWeight:500}}>{c}</span><div><button className="edit-btn" onClick={()=>startEditContact("client",c)}>✏️</button><button className="remove-btn" onClick={()=>removeClient(c)}>×</button></div></>}
              </div>)}
            </div>
          </div></div>
        </div>}

        {/* ANUAL - cu raport complet printabil */}
        {tab==="anual"&&<div>
          <div className="no-print" style={{display:"flex",gap:10,marginBottom:14}}>
            <button className="btn" onClick={printReport} style={{background:"var(--blue)"}}>🖨 Printeaza Raport Anual</button>
            <button className="btn" onClick={exportExcel} style={{background:"#1d6f42"}}>⬇ Excel Anual</button>
          </div>
          <div style={{display:"flex",gap:12,flexWrap:"wrap",marginBottom:18}}>
            <div className="stat" style={{borderLeft:"3px solid var(--blue)"}}><div style={{fontSize:12,color:"var(--text2)"}}>Cifra de Afaceri {year}</div><div style={{fontSize:22,fontWeight:700,color:"var(--blue)"}}>{fmt(yearStats.cifraAfaceri)} RON</div><div style={{fontSize:10,color:"var(--text3)"}}>(Incasari fara TVA)</div></div>
            <div className="stat"><div style={{fontSize:12,color:"var(--text2)"}}>Incasari {year}</div><div style={{fontSize:22,fontWeight:700,color:"var(--green)"}}>{fmt(yearStats.tI)} RON</div></div>
            <div className="stat"><div style={{fontSize:12,color:"var(--text2)"}}>Plati {year}</div><div style={{fontSize:22,fontWeight:700,color:"var(--red)"}}>{fmt(yearStats.tP)} RON</div></div>
            <div className="stat"><div style={{fontSize:12,color:"var(--text2)"}}>Ch. fTVA {year}</div><div style={{fontSize:22,fontWeight:700,color:"var(--orange)"}}>{fmt(yearStats.tCH)} RON</div></div>
            <div className="stat"><div style={{fontSize:12,color:"var(--text2)"}}>TVA anual</div><div style={{fontSize:22,fontWeight:700,color:"var(--yellow)"}}>{fmt(yearStats.tvaDePlata)} RON</div></div>
            <div className="stat"><div style={{fontSize:12,color:"var(--text2)"}}>Impozit Profit</div><div style={{fontSize:22,fontWeight:700,color:"var(--purple)"}}>{fmt(yearStats.impozit)} RON</div></div>
            <div className="stat"><div style={{fontSize:12,color:"var(--text2)"}}>Profit net {year}</div><div style={{fontSize:22,fontWeight:700,color:(yearStats.profit-yearStats.impozit)>=0?"var(--green)":"var(--red)"}}>{fmt(yearStats.profit-yearStats.impozit)} RON</div></div>
          </div>

          {/* Raport anual complet printabil */}
          <div className="card"><div className="card-header">📊 Raport Anual Complet — {year}</div><div className="card-body">
            <h3 style={{fontSize:16,fontWeight:700,marginBottom:16,textAlign:"center"}}>{firma.nume} — Raport Financiar Anual {year}</h3>
            <table style={{fontSize:14,marginBottom:20}}><tbody>
              <tr style={{background:"var(--blue-bg)",borderBottom:"2px solid var(--blue)"}}><td style={{fontWeight:800,padding:"12px",fontSize:15}}>💼 Cifra de Afaceri</td><td style={{textAlign:"right",fontWeight:800,color:"var(--blue)",padding:"12px",fontSize:18}}>{fmt(yearStats.cifraAfaceri)} RON</td></tr>
              <tr><td style={{fontWeight:600,padding:"10px"}}>Total Incasari (cu TVA)</td><td style={{textAlign:"right",fontWeight:700,color:"var(--green)",padding:"10px"}}>{fmt(yearStats.tI)} RON</td></tr>
              <tr style={{background:"var(--bg3)"}}><td style={{fontWeight:600,padding:"10px"}}>Total Plati facturi (cu TVA)</td><td style={{textAlign:"right",fontWeight:700,color:"var(--red)",padding:"10px"}}>{fmt(yearStats.tP)} RON</td></tr>
              <tr><td style={{fontWeight:600,padding:"10px"}}>Total Cheltuieli fara TVA</td><td style={{textAlign:"right",fontWeight:700,color:"var(--orange)",padding:"10px"}}>{fmt(yearStats.tCH)} RON</td></tr>
              <tr style={{borderTop:"2px solid var(--border)",background:"var(--yellow-bg)"}}><td style={{fontWeight:700,padding:"12px"}}>TVA de plata anual</td><td style={{textAlign:"right",fontWeight:700,color:yearStats.tvaDePlata>0?"var(--red)":"var(--green)",padding:"12px"}}>{fmt(yearStats.tvaDePlata)} RON</td></tr>
              <tr><td style={{fontWeight:600,padding:"10px"}}>Profit brut</td><td style={{textAlign:"right",fontWeight:700,color:yearStats.profit>=0?"var(--green)":"var(--red)",padding:"10px"}}>{fmt(yearStats.profit)} RON</td></tr>
              <tr style={{background:"var(--bg3)"}}><td style={{fontWeight:600,padding:"10px"}}>Impozit pe profit (16%)</td><td style={{textAlign:"right",fontWeight:700,color:"var(--purple)",padding:"10px"}}>{fmt(yearStats.impozit)} RON</td></tr>
              <tr style={{borderTop:"3px solid var(--purple)",background:"var(--blue-bg)"}}><td style={{fontWeight:800,fontSize:16,padding:"14px"}}>Profit net anual</td><td style={{textAlign:"right",fontWeight:800,fontSize:20,color:(yearStats.profit-yearStats.impozit)>=0?"var(--green)":"var(--red)",padding:"14px"}}>{fmt(yearStats.profit-yearStats.impozit)} RON</td></tr>
            </tbody></table>

            {/* Trimestrial summary */}
            <h4 style={{fontSize:14,fontWeight:700,marginBottom:10}}>📋 Sumar Trimestrial</h4>
            <table style={{marginBottom:20}}><thead><tr><th>Trimestru</th><th style={{textAlign:"right",color:"var(--blue)"}}>CA</th><th style={{textAlign:"right"}}>Incasari</th><th style={{textAlign:"right"}}>Plati</th><th style={{textAlign:"right"}}>Ch. fTVA</th><th style={{textAlign:"right"}}>TVA</th><th style={{textAlign:"right"}}>Profit</th><th style={{textAlign:"right"}}>Impozit</th></tr></thead><tbody>{quarterlyStats.map((q,i)=><tr key={i}><td style={{fontWeight:600}}>{q.name}</td><td style={{textAlign:"right",fontWeight:700,color:"var(--blue)"}}>{fmt(q.bI)}</td><td style={{textAlign:"right",color:"var(--green)"}}>{fmt(q.tI)}</td><td style={{textAlign:"right",color:"var(--red)"}}>{fmt(q.tP)}</td><td style={{textAlign:"right",color:"var(--orange)"}}>{fmt(q.tCH)}</td><td style={{textAlign:"right",color:q.tvaDePlata>0?"var(--red)":"var(--green)"}}>{fmt(q.tvaDePlata)}</td><td style={{textAlign:"right",fontWeight:600,color:q.profit>=0?"var(--green)":"var(--red)"}}>{fmt(q.profit)}</td><td style={{textAlign:"right",color:"var(--purple)"}}>{fmt(q.impozit)}</td></tr>)}</tbody></table>
          </div></div>

          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:18}}>
            <div className="card" style={{borderColor:"var(--green)",borderWidth:2}}><div className="card-header">🏆 Top 10 Clienti — {year}</div><div className="card-body">{topClienti.length===0?<div style={{textAlign:"center",color:"var(--text3)",padding:16}}>Nu sunt incasari.</div>:<table><thead><tr><th>#</th><th>Client</th><th style={{textAlign:"right"}}>Total</th><th style={{textAlign:"right"}}>%</th></tr></thead><tbody>{topClienti.map(([n,v],i)=><tr key={n}><td style={{fontWeight:700,color:i<3?"var(--yellow)":"var(--text3)"}}>{i+1}</td><td style={{fontWeight:500}}>{n}</td><td style={{textAlign:"right",fontWeight:600,color:"var(--green)"}}>{fmt(v)}</td><td style={{textAlign:"right",color:"var(--text2)"}}>{yearStats.tI>0?(v/yearStats.tI*100).toFixed(1):0}%</td></tr>)}</tbody></table>}</div></div>
            <div className="card" style={{borderColor:"var(--red)",borderWidth:2}}><div className="card-header">📊 Top 10 Cheltuieli — {year}</div><div className="card-body">{topFurnizori.length===0?<div style={{textAlign:"center",color:"var(--text3)",padding:16}}>Nu sunt cheltuieli.</div>:<table><thead><tr><th>#</th><th>Furnizor</th><th style={{textAlign:"right"}}>Total</th><th style={{textAlign:"right"}}>%</th></tr></thead><tbody>{topFurnizori.map(([n,v],i)=>{const tot=yearStats.tP+yearStats.tCH;return <tr key={n}><td style={{fontWeight:700,color:i<3?"var(--yellow)":"var(--text3)"}}>{i+1}</td><td style={{fontWeight:500}}>{n}</td><td style={{textAlign:"right",fontWeight:600,color:"var(--red)"}}>{fmt(v)}</td><td style={{textAlign:"right",color:"var(--text2)"}}>{tot>0?(v/tot*100).toFixed(1):0}%</td></tr>;})}</tbody></table>}</div></div>
          </div>
          <div className="card"><div className="card-header">📅 Detalii Lunare — {year}</div><div className="card-body" style={{overflowX:"auto"}}><table><thead><tr><th>Luna</th><th style={{textAlign:"right",color:"var(--blue)"}}>CA</th><th style={{textAlign:"right"}}>Incasari</th><th style={{textAlign:"right"}}>Plati</th><th style={{textAlign:"right"}}>Ch. fTVA</th><th style={{textAlign:"right"}}>TVA</th><th style={{textAlign:"right"}}>Profit</th><th style={{textAlign:"center"}}>Nr.</th></tr></thead><tbody>{MONTHS.map((m,i)=>{const md=data[year]?.[m]||{plati:[],incasari:[],cheltuieliFaraTVA:[]};const ch=md.cheltuieliFaraTVA||[];const inc=md.incasari.filter(x=>x.tipPlata!=="Neachitat").reduce((s,x)=>s+x.amount,0);const pl=md.plati.filter(x=>x.tipPlata!=="Neachitat").reduce((s,x)=>s+x.amount,0);const tCH=ch.filter(x=>x.tipPlata!=="Neachitat").reduce((s,x)=>s+x.amount,0);const tvaInc=md.incasari.filter(x=>x.tipPlata!=="Neachitat").reduce((s,x)=>s+getTva(x.amount),0);const tvaPl=md.plati.filter(x=>x.tipPlata!=="Neachitat").reduce((s,x)=>s+getTva(x.amount),0);const ca=inc-tvaInc;const pr=ca-(pl-tvaPl)-tCH;const has=md.plati.length>0||md.incasari.length>0||ch.length>0;const cnt=md.plati.length+md.incasari.length+ch.length;return <tr key={m} style={{opacity:has?1:0.4,cursor:"pointer"}} onClick={()=>{setMonth(m);setTab("dashboard");}}><td style={{fontWeight:600}}>{m}{m===month&&<span style={{marginLeft:6,fontSize:10,color:"var(--blue)"}}> ◀</span>}</td><td style={{textAlign:"right",fontWeight:700,color:"var(--blue)"}}>{has?fmt(ca):"—"}</td><td style={{textAlign:"right",color:"var(--green)"}}>{has?fmt(inc):"—"}</td><td style={{textAlign:"right",color:"var(--red)"}}>{has?fmt(pl):"—"}</td><td style={{textAlign:"right",color:"var(--orange)"}}>{has?fmt(tCH):"—"}</td><td style={{textAlign:"right",color:"var(--yellow)"}}>{has?fmt(tvaInc-tvaPl):"—"}</td><td style={{textAlign:"right",fontWeight:600,color:pr>=0?"var(--green)":"var(--red)"}}>{has?fmt(pr):"—"}</td><td style={{textAlign:"center"}}>{has?<span style={{background:"var(--blue-bg2)",color:"var(--blue)",padding:"2px 10px",borderRadius:12,fontSize:12,fontWeight:600}}>{cnt}</span>:"—"}</td></tr>;})}</tbody>
            <tfoot><tr style={{fontWeight:700,borderTop:"3px solid var(--border)",background:"var(--blue-bg)"}}><td>TOTAL {year}</td><td style={{textAlign:"right",fontWeight:800,color:"var(--blue)"}}>{fmt(yearStats.cifraAfaceri)}</td><td style={{textAlign:"right",color:"var(--green)"}}>{fmt(yearStats.tI)}</td><td style={{textAlign:"right",color:"var(--red)"}}>{fmt(yearStats.tP)}</td><td style={{textAlign:"right",color:"var(--orange)"}}>{fmt(yearStats.tCH)}</td><td style={{textAlign:"right",color:"var(--yellow)"}}>{fmt(yearStats.tvaDePlata)}</td><td style={{textAlign:"right",fontWeight:800,color:yearStats.profit>=0?"var(--green)":"var(--red)"}}>{fmt(yearStats.profit)}</td><td></td></tr></tfoot>
          </table></div></div>
        </div>}
      </div>

      {/* SEARCH MODAL */}
      {showSearch&&<div className="modal-overlay" onClick={()=>setShowSearch(false)}><div className="modal search-modal" onClick={e=>e.stopPropagation()}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
          <h2 style={{fontSize:18,fontWeight:700}}>🔍 Cautare Globala</h2>
          <button onClick={()=>setShowSearch(false)} style={{background:"none",border:"none",fontSize:20,cursor:"pointer",color:"var(--text)"}}>✕</button>
        </div>
        <input className="input" autoFocus value={searchQuery} onChange={e=>{setSearchQuery(e.target.value);doSearch(e.target.value);}} placeholder="Cauta furnizor, client, suma, categorie..." style={{marginBottom:14,fontSize:15,padding:"12px 16px"}}/>
        {searchQuery.length>=2&&<div style={{fontSize:12,color:"var(--text2)",marginBottom:8}}>{searchResults.length} rezultate gasite {searchResults.length===100?"(limitat la 100)":""}</div>}
        <div style={{maxHeight:400,overflowY:"auto"}}>
          {searchResults.length===0&&searchQuery.length>=2&&<div style={{textAlign:"center",padding:30,color:"var(--text3)"}}>Niciun rezultat gasit.</div>}
          {searchResults.map((r,i)=><div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 14px",borderBottom:"1px solid var(--border2)",cursor:"pointer",borderRadius:6}} onClick={()=>{setYear(r.year);setMonth(r.month);setTab(r.type==="Plata"?"plati":r.type==="Incasare"?"incasari":r.type==="Cheltuiala fTVA"?"cheltuieli":"registru");setShowSearch(false);}}>
            <div>
              <div style={{fontWeight:600,fontSize:14}}>{r.name}</div>
              <div style={{fontSize:11,color:"var(--text2)"}}>
                <span className={r.type==="Incasare"?"badge badge-op":"badge"} style={{fontSize:10,marginRight:6}}>{r.type}</span>
                {r.category&&<span style={{marginRight:6}}>{r.category}</span>}
                {r.month} {r.year} · {fmtDate(r.data)}
              </div>
            </div>
            <div style={{textAlign:"right"}}>
              <div style={{fontWeight:700,color:r.type==="Incasare"?"var(--green)":"var(--red)"}}>{fmt(r.amount)} RON</div>
              <div style={{fontSize:11}}><TipPlataBadge tip={r.tipPlata||"OP"}/></div>
            </div>
          </div>)}
        </div>
      </div></div>}

      {/* SETTINGS MODAL */}
      {showSettings&&<div className="modal-overlay" onClick={()=>setShowSettings(false)}><div className="modal" onClick={e=>e.stopPropagation()}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}><h2 style={{fontSize:18,fontWeight:700}}>⚙ Setari</h2><button onClick={()=>setShowSettings(false)} style={{background:"none",border:"none",fontSize:20,cursor:"pointer",color:"var(--text)"}}>✕</button></div>
        <div style={{display:"flex",flexDirection:"column",gap:14}}>
          <div><label style={{fontSize:12,fontWeight:600,display:"block",marginBottom:6,color:"var(--text2)"}}>Date Firma</label><button className="btn" onClick={()=>{setEditFirma({...firma});setShowFirmaModal(true);setShowSettings(false);}} style={{background:"var(--blue)",width:"100%"}}>🏢 Editeaza datele firmei</button></div>
          <div><label style={{fontSize:12,fontWeight:600,display:"block",marginBottom:4,color:"var(--text2)"}}>Google Sheets URL</label><div style={{display:"flex",gap:8}}><input className="input" value={scriptUrl} readOnly style={{fontSize:11}}/><button className="btn" onClick={()=>navigator.clipboard.writeText(scriptUrl)} style={{background:"var(--blue)",padding:"8px 14px",fontSize:12}}>📋</button></div></div>
          <div><button className="btn" onClick={()=>{setShowSettings(false);disconnect();}} style={{background:"var(--red)",width:"100%"}}>🔄 Deconecteaza si schimba contul</button></div>
          <div><label style={{fontSize:12,fontWeight:600,display:"block",marginBottom:6,color:"var(--text2)"}}>Backup & Restaurare</label><div style={{display:"flex",gap:8}}><button className="btn" onClick={backupJSON} style={{background:"var(--green)",flex:1}}>⬇ Backup</button><label className="btn" style={{background:"var(--orange)",flex:1,textAlign:"center",cursor:"pointer"}}>⬆ Restaureaza<input type="file" accept=".json" onChange={restoreJSON} style={{display:"none"}}/></label></div></div>
          <div style={{borderTop:"1px solid var(--border)",paddingTop:12}}><label style={{fontSize:12,fontWeight:600,display:"block",marginBottom:6,color:"var(--text2)"}}>Categorii</label><div style={{display:"flex",gap:8}}><button className="btn" onClick={()=>{setCatModalType("tva");setShowCatModal(true);setShowSettings(false);}} style={{background:"var(--blue)",flex:1,fontSize:12,padding:"8px"}}>📂 Cu TVA ({CATS.length})</button><button className="btn" onClick={()=>{setCatModalType("notva");setShowCatModal(true);setShowSettings(false);}} style={{background:"var(--orange)",flex:1,fontSize:12,padding:"8px"}}>💼 Fara TVA ({CATS_NOTVA.length})</button></div></div>
          <div style={{borderTop:"1px solid var(--border)",paddingTop:12}}>
            <label style={{fontSize:12,fontWeight:600,display:"block",marginBottom:6,color:"var(--text2)"}}>Schimba Parola</label>
            {!showPwdChange?<button className="btn" onClick={()=>setShowPwdChange(true)} style={{background:"var(--purple)",width:"100%"}}>🔒 Schimba parola</button>:
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              <input className="input" type="password" placeholder="Parola veche" value={pwdOld} onChange={e=>setPwdOld(e.target.value)}/>
              <input className="input" type="password" placeholder="Parola noua (min 4 caractere)" value={pwdNew} onChange={e=>setPwdNew(e.target.value)}/>
              <input className="input" type="password" placeholder="Confirma parola noua" value={pwdConfirm} onChange={e=>setPwdConfirm(e.target.value)} onKeyDown={e=>e.key==="Enter"&&changePassword()}/>
              {pwdMsg&&<div style={{fontSize:12,fontWeight:600,color:pwdMsg.startsWith("✅")?"var(--green)":"var(--red)"}}>{pwdMsg}</div>}
              <div style={{display:"flex",gap:8}}><button className="btn" onClick={changePassword} style={{background:"var(--green)",flex:1}}>💾 Salveaza</button><button className="btn" onClick={()=>{setShowPwdChange(false);setPwdMsg("");setPwdOld("");setPwdNew("");setPwdConfirm("");}} style={{background:"var(--border3)",color:"var(--text)",flex:1}}>Anuleaza</button></div>
            </div>}
          </div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",borderTop:"1px solid var(--border)",paddingTop:12}}><span style={{fontWeight:600}}>Dark Mode</span><button className="btn" onClick={()=>setDarkMode(!darkMode)} style={{background:darkMode?"var(--green)":"var(--border3)",padding:"8px 24px"}}>{darkMode?"☀️ Light":"🌙 Dark"}</button></div>
          <div style={{fontSize:11,color:"var(--text3)",borderTop:"1px solid var(--border)",paddingTop:12,textAlign:"center"}}>Gestiune Financiara v6.0 · {firma.nume}</div>
        </div>
      </div></div>}

      {/* FIRMA MODAL */}
      {showFirmaModal&&<div className="modal-overlay" onClick={()=>setShowFirmaModal(false)}><div className="modal" onClick={e=>e.stopPropagation()}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}><h2 style={{fontSize:16,fontWeight:700}}>🏢 Date Firma</h2><button onClick={()=>setShowFirmaModal(false)} style={{background:"none",border:"none",fontSize:20,cursor:"pointer",color:"var(--text)"}}>✕</button></div>
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          {[["nume","Denumire firma"],["cui","CUI"],["regCom","Nr. Reg. Comert"],["sediu","Adresa sediu"],["localitate","Judet / Localitate"],["cont","Cont bancar (IBAN)"],["banca","Banca"],["administrator","Administrator"]].map(([key,label])=>
            <div key={key}><label style={{fontSize:12,fontWeight:600,display:"block",marginBottom:3,color:"var(--text2)"}}>{label}</label><input className="input" value={editFirma[key]||""} onChange={e=>setEditFirma({...editFirma,[key]:e.target.value})}/></div>
          )}
          <button className="btn" onClick={saveFirma} style={{background:"var(--green)",marginTop:8,width:"100%"}}>💾 Salveaza datele firmei</button>
        </div>
      </div></div>}

      {/* EDIT ITEM MODAL */}
      {editModal&&<div className="modal-overlay" onClick={()=>setEditModal(null)}><div className="modal" onClick={e=>e.stopPropagation()}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}><h2 style={{fontSize:16,fontWeight:700}}>✏️ Editeaza {editModal.type==="plati"?"Plata":editModal.type==="cheltuieliFaraTVA"?"Cheltuiala":"Incasarea"}</h2><button onClick={()=>setEditModal(null)} style={{background:"none",border:"none",fontSize:20,cursor:"pointer",color:"var(--text)"}}>✕</button></div>
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          <div><label style={{fontSize:12,fontWeight:600,display:"block",marginBottom:3,color:"var(--text2)"}}>{editModal.type==="plati"?"Furnizor":editModal.type==="cheltuieliFaraTVA"?"Descriere":"Client"}</label><input className="input" value={editModal.name} onChange={e=>setEditModal({...editModal,name:e.target.value})}/></div>
          <div><label style={{fontSize:12,fontWeight:600,display:"block",marginBottom:3,color:"var(--text2)"}}>{editModal.type==="cheltuieliFaraTVA"?"Suma (RON)":"Suma cu TVA"}</label><input className="input" type="number" value={editModal.amount} onChange={e=>setEditModal({...editModal,amount:e.target.value})} step="0.01"/></div>
          {editModal.type==="plati"&&<div><label style={{fontSize:12,fontWeight:600,display:"block",marginBottom:3,color:"var(--text2)"}}>Categorie</label><select className="input" value={editModal.category} onChange={e=>setEditModal({...editModal,category:e.target.value})}>{CATS.map(c=><option key={c}>{c}</option>)}</select></div>}
          {editModal.type==="cheltuieliFaraTVA"&&<div><label style={{fontSize:12,fontWeight:600,display:"block",marginBottom:3,color:"var(--text2)"}}>Categorie</label><select className="input" value={editModal.category} onChange={e=>setEditModal({...editModal,category:e.target.value})}>{CATS_NOTVA.map(c=><option key={c}>{c}</option>)}</select></div>}
          <div><label style={{fontSize:12,fontWeight:600,display:"block",marginBottom:3,color:"var(--text2)"}}>Tip plata</label><select className="input" value={editModal.tipPlata} onChange={e=>setEditModal({...editModal,tipPlata:e.target.value})}><option value="OP">🏦 OP</option><option value="Cash">💵 Cash</option><option value="Neachitat">⏳ Neachitat</option></select></div>
          <div><label style={{fontSize:12,fontWeight:600,display:"block",marginBottom:3,color:"var(--text2)"}}>Data</label><input className="input" type="date" value={editModal.data} onChange={e=>setEditModal({...editModal,data:e.target.value})}/></div>
          <div><label style={{fontSize:12,fontWeight:600,display:"block",marginBottom:3,color:"var(--text2)"}}>Nr. document (optional)</label><input className="input" value={editModal.nrDocument} onChange={e=>setEditModal({...editModal,nrDocument:e.target.value})} placeholder="Nr. document"/></div>
          <div><label style={{fontSize:12,fontWeight:600,display:"block",marginBottom:3,color:"var(--text2)"}}>Tip document (optional)</label><select className="input" value={editModal.tipDoc} onChange={e=>setEditModal({...editModal,tipDoc:e.target.value})}><option value="">—</option>{TIP_DOC_OPTIONS.map(t=><option key={t} value={t}>{t}</option>)}</select></div>
          <button className="btn" onClick={saveEditItem} style={{background:"var(--green)",marginTop:8,width:"100%"}}>💾 Salveaza modificarile</button>
        </div>
      </div></div>}

      {/* CATEGORY MODAL */}
      {showCatModal&&<div className="modal-overlay" onClick={()=>setShowCatModal(false)}><div className="modal" onClick={e=>e.stopPropagation()}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}><h2 style={{fontSize:16,fontWeight:700}}>{catModalType==="tva"?"📂 Categorii cu TVA":"💼 Categorii fara TVA"}</h2><button onClick={()=>setShowCatModal(false)} style={{background:"none",border:"none",fontSize:20,cursor:"pointer",color:"var(--text)"}}>✕</button></div>
        <div style={{display:"flex",gap:8,marginBottom:14}}><input className="input" value={newCatName} onChange={e=>setNewCatName(e.target.value)} placeholder="Categorie noua..." onKeyDown={e=>e.key==="Enter"&&addCategory(catModalType)}/><button className="btn" onClick={()=>addCategory(catModalType)} style={{background:catModalType==="tva"?"var(--blue)":"var(--orange)"}}>+ Adauga</button></div>
        <div style={{display:"flex",flexDirection:"column",gap:6,maxHeight:350,overflowY:"auto"}}>{(catModalType==="tva"?CATS:CATS_NOTVA).map((cat,i)=><div key={cat} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 12px",background:"var(--bg3)",borderRadius:8}}><span style={{fontSize:13,fontWeight:500}}>{i+1}. {cat}</span><button className="remove-btn" onClick={()=>removeCategory(catModalType,cat)}>×</button></div>)}</div>
      </div></div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
<script>
if('serviceWorker' in navigator){navigator.serviceWorker.register('./sw.js').catch(e=>console.log('SW reg failed:',e));}
</script>
</body>
</html>
